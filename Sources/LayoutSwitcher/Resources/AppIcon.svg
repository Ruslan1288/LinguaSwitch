<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Top face: lit from above-left, lightest surface -->
  <linearGradient id="topFaceG" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#2A2A2A"/>
    <stop offset="100%" stop-color="#3E3E3E"/>
  </linearGradient>

  <!-- Front face: medium dark, lit slightly from left -->
  <linearGradient id="frontFaceG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#222222"/>
    <stop offset="100%" stop-color="#131313"/>
  </linearGradient>

  <!-- Right side face: in shadow, darkest surface -->
  <linearGradient id="rightFaceG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#141414"/>
    <stop offset="100%" stop-color="#060606"/>
  </linearGradient>

  <!-- Inner recessed face -->
  <radialGradient id="innerFaceG" cx="60%" cy="60%" r="70%">
    <stop offset="0%"   stop-color="#0D0D0D"/>
    <stop offset="100%" stop-color="#070707"/>
  </radialGradient>

  <!-- Globe fill -->
  <radialGradient id="globeFillG" cx="35%" cy="30%" r="70%">
    <stop offset="0%"   stop-color="#161616"/>
    <stop offset="100%" stop-color="#060606"/>
  </radialGradient>

  <!-- Globe top-left specular -->
  <radialGradient id="globeSpecG" cx="28%" cy="24%" r="55%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>

  <!-- Top face edge gradient (back rim-light) -->
  <linearGradient id="topRimG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.50"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.18"/>
  </linearGradient>

  <!-- Front face top-left chamfer: bright, fading to dim -->
  <linearGradient id="chamferLitG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.60"/>
    <stop offset="45%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
  </linearGradient>

  <!-- Front face bottom-right chamfer: shadow -->
  <linearGradient id="chamferDarkG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#000000" stop-opacity="0.02"/>
    <stop offset="55%"  stop-color="#000000" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.90"/>
  </linearGradient>

  <!-- Inner face bevel: lit top-left -->
  <linearGradient id="innerBevelLitG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
  </linearGradient>

  <!-- Globe line glow -->
  <filter id="lineGlow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="3.8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Ambient occlusion at 3D corner -->
  <filter id="aoBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>

  <!-- Key drop shadow -->
  <filter id="dropShadow" x="-25%" y="-25%" width="160%" height="160%">
    <feDropShadow dx="8" dy="18" stdDeviation="48" flood-color="#000000" flood-opacity="1"/>
  </filter>

  <!-- Globe clip path -->
  <clipPath id="globeClip">
    <circle cx="472" cy="552" r="292"/>
  </clipPath>

</defs>

<!-- ════════════════════════════════════════════════════ -->
<!--  BACKGROUND                                         -->
<!-- ════════════════════════════════════════════════════ -->
<rect width="1024" height="1024" fill="#000000"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  3D KEYCAP                                          -->
<!--                                                     -->
<!--  Three visible faces:                               -->
<!--    TOP   — parallelogram above front face           -->
<!--    FRONT — main face (740×720), holds globe         -->
<!--    RIGHT — parallelogram right of front face        -->
<!--                                                     -->
<!--  Projection: depth 100px at 45° (right+up)         -->
<!--  Front face: (82, 192) → (862, 192+720=912)        -->
<!--  Depth offset: (+100, −100)                        -->
<!--  Top face corners: (82,192)(862,192)(962,92)(182,92)-->
<!--  Right face corners:(862,192)(962,92)(962,812)(862,912)-->
<!-- ════════════════════════════════════════════════════ -->

<!-- Drop shadow -->
<rect x="82" y="192" width="780" height="720" rx="90" ry="90"
  fill="#111111" filter="url(#dropShadow)"/>

<!-- ── RIGHT SIDE FACE (darkest — shadow side) ── -->
<polygon
  points="862,192 962,92 962,812 862,912"
  fill="url(#rightFaceG)"/>

<!-- Subtle specular on right face top edge -->
<line x1="862" y1="192" x2="962" y2="92"
  stroke="#555555" stroke-width="1.2"/>

<!-- ── TOP FACE (lightest — direct light from above) ── -->
<polygon
  points="82,192 862,192 962,92 182,92"
  fill="url(#topFaceG)"/>

<!-- Top face: subtle inner texture gradient (center slightly darker) -->
<polygon
  points="82,192 862,192 962,92 182,92"
  fill="none" opacity="0.5"/>

<!-- Back edge of top face: rim light (light from behind/above) -->
<line x1="182" y1="92" x2="962" y2="92"
  stroke="url(#topRimG)" stroke-width="1.5"/>

<!-- Left back edge of top face: rim light -->
<line x1="82" y1="192" x2="182" y2="92"
  stroke="#FFFFFF" stroke-width="1.2" stroke-opacity="0.45"/>

<!-- ── AMBIENT OCCLUSION at 3D corner (862, 192) ── -->
<!-- Subtle dark gradient where all three faces meet -->
<circle cx="862" cy="192" r="60" fill="#000000" opacity="0.35"
  filter="url(#aoBlur)"/>

<!-- ── FRONT FACE (main surface, holds globe) ── -->
<rect x="82" y="192" width="780" height="720" rx="90" ry="90"
  fill="url(#frontFaceG)"/>

<!-- Front face: bright chamfer on top + left edges -->
<rect x="82" y="192" width="780" height="720" rx="90" ry="90"
  fill="none" stroke="url(#chamferLitG)" stroke-width="4.5"/>

<!-- Front face: shadow chamfer on bottom + right edges -->
<rect x="84" y="194" width="776" height="716" rx="88" ry="88"
  fill="none" stroke="url(#chamferDarkG)" stroke-width="3.5"/>

<!-- Sharp bright specular on the very top-left corner arc -->
<rect x="82" y="192" width="780" height="720" rx="90" ry="90"
  fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.35"/>

<!-- ── JUNCTION EDGE: top face meets front face ── -->
<!-- This horizontal line is the top chamfer/edge of the keycap — brightest point -->
<line x1="174" y1="192" x2="862" y2="192"
  stroke="#FFFFFF" stroke-width="2.5" stroke-opacity="0.70"/>

<!-- ── JUNCTION EDGE: top face meets right face ── -->
<line x1="862" y1="192" x2="962" y2="92"
  stroke="#FFFFFF" stroke-width="1.8" stroke-opacity="0.40"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  FRONT FACE INNER RECESS                            -->
<!--  Outer: 82→862 x, 192→912 y                        -->
<!--  Inner: 128→816 x, 242→862 y  (46px bevel)         -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Bevel shadow (ambient occlusion in the recess) -->
<rect x="122" y="236" width="698" height="632" rx="68" ry="68"
  fill="#000000" opacity="0.70"/>

<!-- Inner face surface -->
<rect x="128" y="242" width="686" height="620" rx="64" ry="64"
  fill="url(#innerFaceG)"/>

<!-- Inner face: lit bevel line at top-left -->
<rect x="128" y="242" width="686" height="620" rx="64" ry="64"
  fill="none" stroke="url(#innerBevelLitG)" stroke-width="2"/>

<!-- Inner face: dark bevel at bottom-right (shadow inside the recess) -->
<rect x="130" y="244" width="682" height="616" rx="62" ry="62"
  fill="none" stroke="#000000" stroke-width="3" stroke-opacity="0.80"/>

<!-- Specular on inner face top-left (diffuse catch light) -->
<ellipse cx="248" cy="302" rx="160" ry="64"
  fill="#FFFFFF" opacity="0.034" transform="rotate(-28 248 302)"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  GLOBE                                              -->
<!--  Center: (472, 552)  Radius: 292                   -->
<!--  Perspective ratio: 0.28                           -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Globe fill -->
<circle cx="472" cy="552" r="292" fill="url(#globeFillG)"/>

<!-- Globe specular overlay -->
<circle cx="472" cy="552" r="292" fill="url(#globeSpecG)"/>

<!-- ── GRID (clipped, luminous white) ── -->
<g clip-path="url(#globeClip)" filter="url(#lineGlow)">

  <!-- ═ LATITUDE ═ -->
  <!-- R=292, cy=552. y = 552−292·sin(φ), rx = 292·cos(φ), ry = rx·0.28 -->

  <!-- φ=0° equator -->
  <ellipse cx="472" cy="552" rx="292" ry="82"
    fill="none" stroke="#FFFFFF" stroke-width="2.6"/>

  <!-- φ=±15°: y_off=76, rx=282, ry=79 -->
  <ellipse cx="472" cy="476" rx="282" ry="79" fill="none" stroke="#DDDDDD" stroke-width="1.4"/>
  <ellipse cx="472" cy="628" rx="282" ry="79" fill="none" stroke="#DDDDDD" stroke-width="1.4"/>

  <!-- φ=±30°: y_off=146, rx=253, ry=71 -->
  <ellipse cx="472" cy="406" rx="253" ry="71" fill="none" stroke="#EEEEEE" stroke-width="1.7"/>
  <ellipse cx="472" cy="698" rx="253" ry="71" fill="none" stroke="#EEEEEE" stroke-width="1.7"/>

  <!-- φ=±45°: y_off=207, rx=207, ry=58 -->
  <ellipse cx="472" cy="345" rx="207" ry="58" fill="none" stroke="#CCCCCC" stroke-width="1.4"/>
  <ellipse cx="472" cy="759" rx="207" ry="58" fill="none" stroke="#CCCCCC" stroke-width="1.4"/>

  <!-- φ=±60°: y_off=253, rx=146, ry=41 -->
  <ellipse cx="472" cy="299" rx="146" ry="41" fill="none" stroke="#E2E2E2" stroke-width="1.6"/>
  <ellipse cx="472" cy="805" rx="146" ry="41" fill="none" stroke="#E2E2E2" stroke-width="1.6"/>

  <!-- φ=±75°: y_off=282, rx=76, ry=21 -->
  <ellipse cx="472" cy="270" rx="76"  ry="21" fill="none" stroke="#BBBBBB" stroke-width="1.2"/>
  <ellipse cx="472" cy="834" rx="76"  ry="21" fill="none" stroke="#BBBBBB" stroke-width="1.2"/>

  <!-- φ=±87°: polar rings, rx=15, ry=4 -->
  <ellipse cx="472" cy="261" rx="15"  ry="4"  fill="none" stroke="#999999" stroke-width="1.0"/>
  <ellipse cx="472" cy="843" rx="15"  ry="4"  fill="none" stroke="#999999" stroke-width="1.0"/>

  <!-- ═ LONGITUDE / MERIDIANS ═ -->
  <!-- rx = 292·sin(λ), ry=292, center (472,552) -->

  <!-- λ=0° prime meridian -->
  <line x1="472" y1="260" x2="472" y2="844" stroke="#FFFFFF" stroke-width="2.6"/>

  <!-- λ=±10°: rx=51 -->
  <ellipse cx="472" cy="552" rx="51"  ry="292" fill="none" stroke="#C0C0C0" stroke-width="1.2"/>

  <!-- λ=±20°: rx=100 -->
  <ellipse cx="472" cy="552" rx="100" ry="292" fill="none" stroke="#D4D4D4" stroke-width="1.4"/>

  <!-- λ=±30°: rx=146 -->
  <ellipse cx="472" cy="552" rx="146" ry="292" fill="none" stroke="#E8E8E8" stroke-width="1.6"/>

  <!-- λ=±40°: rx=188 -->
  <ellipse cx="472" cy="552" rx="188" ry="292" fill="none" stroke="#C8C8C8" stroke-width="1.3"/>

  <!-- λ=±50°: rx=224 -->
  <ellipse cx="472" cy="552" rx="224" ry="292" fill="none" stroke="#D4D4D4" stroke-width="1.4"/>

  <!-- λ=±60°: rx=253 -->
  <ellipse cx="472" cy="552" rx="253" ry="292" fill="none" stroke="#E2E2E2" stroke-width="1.5"/>

  <!-- λ=±70°: rx=274 -->
  <ellipse cx="472" cy="552" rx="274" ry="292" fill="none" stroke="#BABABA" stroke-width="1.1"/>

  <!-- λ=±80°: rx=288 -->
  <ellipse cx="472" cy="552" rx="288" ry="292" fill="none" stroke="#9A9A9A" stroke-width="0.9"/>

</g>

<!-- Globe outer stroke -->
<circle cx="472" cy="552" r="292"
  fill="none" stroke="#FFFFFF" stroke-width="3.0"/>

<!-- Globe outer glow ring -->
<circle cx="472" cy="552" r="298"
  fill="none" stroke="#FFFFFF" stroke-width="8" stroke-opacity="0.06"/>

<!-- Globe top-left sheen arc -->
<path d="M 296 362 A 292 292 0 0 1 628 350"
  fill="none" stroke="#FFFFFF" stroke-width="2.0" stroke-linecap="round" opacity="0.36"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  KEY SURFACE DETAILS                                -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Corner dots on front face -->
<circle cx="152" cy="262" r="4" fill="#FFFFFF" opacity="0.28"/>
<circle cx="792" cy="262" r="4" fill="#FFFFFF" opacity="0.28"/>
<circle cx="152" cy="842" r="4" fill="#FFFFFF" opacity="0.28"/>
<circle cx="792" cy="842" r="4" fill="#FFFFFF" opacity="0.28"/>

<!-- Crosshair ticks -->
<line x1="143" y1="262" x2="161" y2="262" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="152" y1="253" x2="152" y2="271" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="783" y1="262" x2="801" y2="262" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="792" y1="253" x2="792" y2="271" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="143" y1="842" x2="161" y2="842" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="152" y1="833" x2="152" y2="851" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="783" y1="842" x2="801" y2="842" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>
<line x1="792" y1="833" x2="792" y2="851" stroke="#FFFFFF" stroke-width="1" opacity="0.20"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  TOP FACE DETAILS                                   -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Subtle grid lines on top face surface (keycap texture) -->
<g opacity="0.06">
  <line x1="82"  y1="168" x2="862" y2="168" stroke="#FFFFFF" stroke-width="1"
    transform="translate(34,-20)"/>
  <line x1="82"  y1="168" x2="862" y2="168" stroke="#FFFFFF" stroke-width="1"
    transform="translate(60,-36)"/>
  <line x1="82"  y1="168" x2="862" y2="168" stroke="#FFFFFF" stroke-width="1"
    transform="translate(86,-52)"/>
</g>

<!-- Top face: center engraving highlight (subtle cross) -->
<line x1="572" y1="118" x2="572" y2="178"
  stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.18"/>
<line x1="532" y1="142" x2="612" y2="142"
  stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.18"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  BOTTOM EDGE SHADOW UNDER KEY                       -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Ground shadow at bottom of front face -->
<ellipse cx="472" cy="940" rx="380" ry="22"
  fill="#000000" opacity="0.0"/>

</svg>
